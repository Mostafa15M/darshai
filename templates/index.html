<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darsh-Ai | الإصدار النهائي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); border-color: rgba(59, 130, 246, 0.5); }
        .loader { border: 3px solid transparent; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="text-center mb-12">
        <h1 class="text-6xl font-black bg-gradient-to-r from-blue-400 to-purple-600 bg-clip-text text-transparent">Darsh-Ai</h1>
        <p class="text-gray-400 mt-2">منصة الذكاء الاصطناعي الخاصة بـ مصطفى منصور</p>
    </header>

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="glass p-8 rounded-[2rem] neon-blue">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">🎨 صانع الصور <span class="text-xs bg-blue-500/20 text-blue-400 px-2 py-1 rounded">FREE</span></h2>
            <textarea id="imgPrompt" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 mb-4 outline-none focus:border-blue-500 transition h-28" placeholder="اكتب وصف الصورة هنا..."></textarea>
            <button onclick="generateImage()" id="imgBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold transition flex justify-center items-center gap-3">
                <span id="imgBtnText">إنشاء الصورة الآن</span>
                <div id="imgLoader" class="loader"></div>
            </button>
            <div id="imgResult" class="mt-8 hidden">
                <img id="resImg" src="" class="w-full rounded-2xl shadow-2xl border border-white/10">
                <a id="downBtn" href="#" download="darsh-ai-image.jpg" class="block text-center mt-4 text-sm text-blue-400 hover:underline">تحميل الصورة</a>
            </div>
        </div>

        <div class="glass p-8 rounded-[2rem] neon-blue">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">💬 مساعد GPT-4 <span class="text-xs bg-purple-500/20 text-purple-400 px-2 py-1 rounded">PRO</span></h2>
            <textarea id="chatInput" class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-4 mb-4 outline-none focus:border-purple-500 transition h-28" placeholder="اسأل أي شيء يدور في ذهنك..."></textarea>
            <button onclick="sendChat()" id="chatBtn" class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-2xl font-bold transition flex justify-center items-center gap-3">
                <span id="chatBtnText">إرسال للمساعد</span>
                <div id="chatLoader" class="loader"></div>
            </button>
            <div id="chatResult" class="mt-8 hidden p-5 bg-slate-900/50 rounded-2xl border border-white/5 text-gray-200 text-sm overflow-y-auto max-h-64">
            </div>
        </div>

    </div>

    <script>
        async function generateImage() {
            const prompt = document.getElementById('imgPrompt').value;
            if(!prompt) return alert("من فضلك ادخل وصف الصورة");

            setLoading('img', true);
            try {
                const res = await fetch('/api/generate-image', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt})
                });
                const data = await res.json();
                if(data.url) {
                    const img = document.getElementById('resImg');
                    img.src = data.url;
                    document.getElementById('downBtn').href = data.url;
                    document.getElementById('imgResult').classList.remove('hidden');
                }
            } catch (e) { alert("حدث خطأ في الخادم"); }
            setLoading('img', false);
        }

        async function sendChat() {
            const message = document.getElementById('chatInput').value;
            if(!message) return alert("اكتب سؤالك أولاً");

            setLoading('chat', true);
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message})
                });
                const data = await res.json();
                const content = data.choices[0].message.content;
                const resDiv = document.getElementById('chatResult');
                resDiv.innerText = content;
                resDiv.classList.remove('hidden');
            } catch (e) { alert("خطأ في الاتصال"); }
            setLoading('chat', false);
        }

        function setLoading(id, isLoading) {
            const btn = document.getElementById(id + 'Btn');
            const text = document.getElementById(id + 'BtnText');
            const loader = document.getElementById(id + 'Loader');
            btn.disabled = isLoading;
            text.style.display = isLoading ? 'none' : 'block';
            loader.style.display = isLoading ? 'block' : 'none';
        }
    </script>
</body>
</html>
